<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FilterSys — A FOMO reduction tool for university students. Make clear-headed decisions about extracurricular activities.">
  <title>FilterSys — Not every opportunity is your opportunity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
/* ═══════════════════════════════════════════════
   FilterSys — Design System & Styles
   Palette: Warm Yellow / Red / White
   Font: Plus Jakarta Sans
   ═══════════════════════════════════════════════ */

/* ─── Tokens ─── */
:root {
  --bg: #FDFBF7;
  --bg-alt: #F7F4EE;
  --surface: #FFFFFF;
  --surface-raised: #FFF9EE;
  --surface-hover: #FFF3DA;
  --border: #E8E4DC;
  --border-subtle: #F0EDE6;

  --primary: #D4940A;
  --primary-dim: #B07A00;
  --primary-light: #FCEFC7;
  --primary-glow: rgba(212, 148, 10, 0.12);
  --primary-glow-strong: rgba(212, 148, 10, 0.25);

  --danger: #C62828;
  --danger-dim: #9B1C1C;
  --danger-light: #FDE8E8;
  --danger-glow: rgba(198, 40, 40, 0.10);

  --accent: #E65100;
  --accent-dim: #BF4400;
  --accent-light: #FFF0E6;
  --accent-glow: rgba(230, 81, 0, 0.10);

  --text: #1C1917;
  --text-secondary: #6B6560;
  --text-muted: #A8A29E;

  --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --radius: 14px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --radius-pill: 100px;

  --shadow-sm: 0 1px 3px rgba(28, 25, 23, 0.06), 0 1px 2px rgba(28, 25, 23, 0.04);
  --shadow-md: 0 4px 12px rgba(28, 25, 23, 0.08);
  --shadow-lg: 0 8px 30px rgba(28, 25, 23, 0.12);
  --shadow-glow-primary: 0 0 24px var(--primary-glow);
  --shadow-glow-accent: 0 0 24px var(--accent-glow);

  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ─── Reset ─── */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

html {
  font-size: 16px;
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ─── Typography ─── */
h1, h2, h3, h4 { line-height: 1.2; font-weight: 700; }
h1 { font-size: 2rem; }
h2 { font-size: 1.5rem; }
h3 { font-size: 1.15rem; }
h4 { font-size: 1rem; }

.mono { font-family: var(--font-mono); }
.text-muted { color: var(--text-muted); }
.text-secondary { color: var(--text-secondary); }
.text-sm { font-size: 0.85rem; }
.text-center { text-align: center; }

/* ─── Layout ─── */
.page {
  display: none !important;
  min-height: 100vh;
  animation: pageFadeIn 0.4s ease;
}
.page.active { display: block !important; }
#page-landing.active { display: flex !important; }

.hidden { display: none !important; }

@keyframes pageFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.page-content {
  max-width: 520px;
  margin: 0 auto;
  padding: 80px 20px 40px;
}

.page-title {
  margin-bottom: 4px;
  color: var(--text);
}
.page-subtitle {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 28px;
}

.section {
  margin-top: 32px;
}
.section-title {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 14px;
  font-weight: 700;
}

/* ─── Header ─── */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: rgba(253, 251, 247, 0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 100;
  transition: var(--transition);
}
.header.hidden { display: none; }

.header-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}
.header-btn:hover {
  background: var(--surface-hover);
  color: var(--text);
  border-color: var(--primary);
}

.header-title {
  font-weight: 800;
  font-size: 1rem;
  color: var(--text);
  letter-spacing: -0.3px;
}

.lang-btn {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 1px;
  width: auto;
  padding: 0 12px;
}

/* ─── Buttons ─── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: var(--font);
  font-weight: 700;
  font-size: 0.9rem;
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  text-decoration: none;
  position: relative;
  overflow: hidden;
}
.btn:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  pointer-events: none;
  box-shadow: none !important;
  transform: none !important;
}

.btn-primary {
  background: linear-gradient(135deg, #E8A817, var(--primary));
  color: #fff;
  box-shadow: var(--shadow-glow-primary), var(--shadow-sm);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 30px var(--primary-glow-strong), var(--shadow-md);
}
.btn-primary:active { transform: translateY(0); }

.btn-danger {
  background: linear-gradient(135deg, #E53935, var(--danger));
  color: #fff;
  box-shadow: 0 0 16px var(--danger-glow), var(--shadow-sm);
}
.btn-danger:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 30px rgba(198, 40, 40, 0.2), var(--shadow-md);
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-ghost:hover {
  background: var(--surface-hover);
  color: var(--text);
  border-color: var(--primary);
}

.btn-lg { padding: 14px 28px; font-size: 1rem; border-radius: var(--radius); }
.btn-sm { padding: 6px 14px; font-size: 0.8rem; }
.btn-full { width: 100%; }

/* ─── Inputs ─── */
.input {
  width: 100%;
  padding: 12px 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.95rem;
  transition: var(--transition);
  outline: none;
}
.input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
.input::placeholder { color: var(--text-muted); }

.textarea {
  resize: vertical;
  min-height: 60px;
  line-height: 1.5;
}

select.input {
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%236B6560' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 14px center;
  padding-right: 36px;
}

/* ─── Forms ─── */
.form { display: flex; flex-direction: column; gap: 20px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: 0.2px;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-section-title {
  font-size: 0.85rem;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding-top: 12px;
  border-top: 1.5px solid var(--border);
  margin-top: 4px;
  font-weight: 800;
}
.input-row {
  display: flex;
  gap: 8px;
}
.input-row .input { flex: 1; }

/* ─── Sliders ─── */
.slider-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  outline: none;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--primary);
  cursor: pointer;
  box-shadow: 0 0 8px var(--primary-glow-strong), var(--shadow-sm);
  border: 3px solid #fff;
  transition: var(--transition);
}
.slider::-webkit-slider-thumb:hover {
  transform: scale(1.15);
  box-shadow: 0 0 16px var(--primary-glow-strong);
}
.slider-value {
  font-family: var(--font-mono);
  font-size: 0.9rem;
  color: var(--primary);
  font-weight: 700;
  min-width: 36px;
  text-align: right;
}
.slider-label-left, .slider-label-right {
  font-size: 0.75rem;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ─── Radio & Checkbox cards ─── */
.radio-group, .checkbox-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.radio-card, .check-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
  box-shadow: var(--shadow-sm);
}
.radio-card:hover, .check-card:hover {
  background: var(--surface-hover);
  border-color: var(--primary);
}
.radio-card:has(input:checked), .check-card:has(input:checked) {
  border-color: var(--primary);
  background: var(--primary-light);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
.radio-card input, .check-card input {
  accent-color: var(--primary);
  width: 18px; height: 18px;
}
.radio-icon { font-size: 1.2rem; }
.radio-text, .check-text { font-size: 0.9rem; font-weight: 500; }

/* ─── Tags Input ─── */
.tags-input-wrapper {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px 12px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  min-height: 44px;
  align-items: center;
  transition: var(--transition);
}
.tags-input-wrapper:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
.tags-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  background: var(--primary-light);
  border: 1px solid var(--primary);
  border-radius: var(--radius-pill);
  font-size: 0.8rem;
  color: var(--primary-dim);
  font-weight: 600;
}
.tag-remove {
  cursor: pointer;
  opacity: 0.6;
  font-size: 0.9rem;
  line-height: 1;
}
.tag-remove:hover { opacity: 1; }
.tags-input {
  border: none !important;
  background: transparent !important;
  padding: 4px 0 !important;
  min-width: 100px;
  flex: 1;
  box-shadow: none !important;
}

/* ═══════════════════════════════════════════════
   LANDING PAGE
   ═══════════════════════════════════════════════ */
#page-landing {
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow: hidden;
  background: linear-gradient(170deg, #FDFBF7 0%, #FFF8E8 40%, #FFF3D4 100%);
}
#page-landing::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(212, 148, 10, 0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(198, 40, 40, 0.04) 0%, transparent 50%);
  animation: bgDrift 20s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes bgDrift {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(30px, -20px) rotate(3deg); }
}

.landing-lang-toggle {
  position: fixed;
  top: 16px; right: 16px;
  z-index: 50;
}
.lang-pill {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 8px 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-pill);
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  box-shadow: var(--shadow-sm);
}
.lang-pill:hover {
  background: var(--surface-hover);
  color: var(--text);
  border-color: var(--primary);
}

.landing-container {
  position: relative;
  z-index: 1;
  max-width: 640px;
  padding: 80px 24px 60px;
  width: 100%;
}

.landing-hero {
  text-align: center;
  margin-bottom: 48px;
}

.landing-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 24px;
}
.logo-icon {
  color: var(--primary);
  display: flex;
  filter: drop-shadow(0 2px 8px var(--primary-glow-strong));
}
.landing-app-name {
  font-size: 2.4rem;
  font-weight: 900;
  letter-spacing: -1px;
  color: var(--text);
}

.landing-tagline {
  font-size: 1.3rem;
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.5;
  max-width: 460px;
  margin: 0 auto;
}

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 40px;
}
.stat-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease, border-color var(--transition), box-shadow var(--transition);
  box-shadow: var(--shadow-sm);
}
.stat-card.visible {
  opacity: 1;
  transform: translateY(0);
}
.stat-card:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-glow-primary), var(--shadow-md);
}
.stat-value {
  font-family: var(--font-mono);
  font-size: 2rem;
  font-weight: 800;
  color: var(--danger);
  line-height: 1;
}
.stat-card:nth-child(4) .stat-value {
  color: var(--danger);
}
.stat-card:nth-child(1) .stat-value,
.stat-card:nth-child(3) .stat-value {
  color: var(--primary-dim);
}
.stat-desc {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.4;
}

.landing-desc {
  color: var(--text-secondary);
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 36px;
  padding: 0 8px;
}

.landing-cta {
  display: block;
  width: 100%;
  margin-bottom: 48px;
  font-size: 1.1rem;
  padding: 16px 32px;
  border-radius: var(--radius);
}

.landing-refs {
  border-top: 1.5px solid var(--border);
  padding-top: 24px;
}
.refs-label {
  font-size: 0.75rem;
  font-weight: 800;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
}
.ref {
  font-size: 0.75rem;
  color: var(--text-muted);
  line-height: 1.6;
}

/* ═══════════════════════════════════════════════
   DASHBOARD
   ═══════════════════════════════════════════════ */
.dash-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
}
.dash-greeting {
  display: flex;
  align-items: center;
  gap: 12px;
}
.dash-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--primary-light);
  border: 2px solid var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--primary-dim);
}
.dash-greeting-text {
  display: block;
  font-size: 0.8rem;
  color: var(--text-muted);
}
.dash-alias {
  font-weight: 800;
  font-size: 1.1rem;
  color: var(--text);
}

/* Quick actions */
.quick-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 28px;
}
.action-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 20px 12px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
  color: var(--text);
  font-family: var(--font);
  box-shadow: var(--shadow-sm);
}
.action-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}
.action-card--ai {
  border-color: var(--accent);
  background: var(--accent-light);
}
.action-card--ai:hover { box-shadow: var(--shadow-glow-accent), var(--shadow-md); }
.action-card--mentor {
  border-color: var(--danger);
  background: var(--danger-light);
}
.action-card--mentor:hover { box-shadow: 0 0 24px var(--danger-glow), var(--shadow-md); }
.action-card--add {
  border-color: var(--primary);
  background: var(--primary-light);
}
.action-card--add:hover { box-shadow: var(--shadow-glow-primary), var(--shadow-md); }

.action-icon { font-size: 1.6rem; }
.action-label {
  font-size: 0.85rem;
  font-weight: 700;
  text-align: center;
}

/* Status bars */
.status-bars {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 20px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.status-item { display: flex; flex-direction: column; gap: 6px; }
.status-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.status-val { color: var(--text); font-weight: 700; font-size: 0.85rem; }

.progress-bar {
  height: 8px;
  background: var(--bg-alt);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.progress-fill--energy {
  background: linear-gradient(90deg, var(--danger), var(--primary));
}
.progress-fill--hours {
  background: linear-gradient(90deg, var(--primary), var(--accent));
}

/* Week calendar */
.week-calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.cal-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 10px 4px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  min-height: 70px;
  transition: var(--transition);
}
.cal-day.today {
  border-color: var(--primary);
  background: var(--primary-light);
  box-shadow: 0 0 0 2px var(--primary-glow);
}
.cal-day-name {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.cal-day-num {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-secondary);
}
.cal-day.today .cal-day-num { color: var(--primary-dim); }
.cal-dots {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  justify-content: center;
}
.cal-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--primary);
}
.cal-dot--academic {
  background: var(--accent);
}
.cal-dot--exam {
  background: var(--danger);
}

/* Card list */
.card-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.activity-card {
  padding: 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  transition: var(--transition);
  box-shadow: var(--shadow-sm);
  position: relative;
}
.activity-card:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-md);
}
.activity-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.activity-card-name {
  font-weight: 700;
  font-size: 1rem;
  margin-bottom: 6px;
  flex: 1;
}
.activity-card-meta {
  font-size: 0.8rem;
  color: var(--text-secondary);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.activity-card-actions {
  display: flex;
  gap: 6px;
  align-items: flex-start;
  flex-shrink: 0;
}
.activity-card-remove {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 28px; height: 28px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  transition: var(--transition);
}
.activity-card-remove:hover {
  background: var(--danger-light);
  color: var(--danger);
  border-color: var(--danger);
}
.activity-card-status {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  text-transform: uppercase;
}
.status-committed {
  background: var(--primary-light);
  color: var(--primary-dim);
  border: 1px solid var(--primary);
}
.status-dropped {
  background: var(--danger-light);
  color: var(--danger);
  border: 1px solid var(--danger-dim);
}

/* Academic task items */
.academic-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  transition: var(--transition);
  box-shadow: var(--shadow-sm);
}
.academic-item:hover { border-color: var(--primary); }
.academic-item.completed {
  opacity: 0.5;
}
.academic-item.completed .academic-item-title {
  text-decoration: line-through;
}
.academic-checkbox {
  margin-top: 2px;
  accent-color: var(--primary);
  width: 18px; height: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
.academic-item-content { flex: 1; min-width: 0; }
.academic-item-title { font-weight: 600; font-size: 0.9rem; }
.academic-item-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
  display: flex;
  gap: 10px;
  margin-top: 4px;
}
.academic-type-badge {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge-exam { background: var(--danger-light); color: var(--danger); }
.badge-assignment { background: var(--primary-light); color: var(--primary-dim); }
.badge-project { background: var(--accent-light); color: var(--accent); }
.badge-presentation { background: #E8F5E9; color: #2E7D32; }

.academic-item-delete {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 4px;
  transition: var(--transition);
  flex-shrink: 0;
}
.academic-item-delete:hover { color: var(--danger); }

.academic-actions {
  display: flex;
  gap: 10px;
  margin-top: 14px;
}

.no-items {
  text-align: center;
  padding: 24px;
  color: var(--text-muted);
  font-size: 0.85rem;
  font-style: italic;
}

/* ═══════════════════════════════════════════════
   ADD ACTIVITY PAGE
   ═══════════════════════════════════════════════ */
.gpa-display {
  padding: 12px 16px;
  background: var(--primary-light);
  border: 1.5px solid var(--primary);
  border-radius: var(--radius-sm);
  font-size: 1.1rem;
  color: var(--primary-dim);
  font-weight: 700;
}
.deadlines-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.deadline-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
}
.deadline-item .academic-type-badge { flex-shrink: 0; }
.deadline-item-name { flex: 1; font-weight: 500; }
.deadline-item-date {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* ═══════════════════════════════════════════════
   ANALYSIS RESULT PAGE
   ═══════════════════════════════════════════════ */
.result-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 24px;
}
.result-ai-icon {
  font-size: 2rem;
  filter: drop-shadow(0 2px 8px var(--accent-glow));
}

.chart-container {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 24px;
  display: flex;
  justify-content: center;
  box-shadow: var(--shadow-sm);
}
.chart-container canvas {
  max-width: 300px;
  max-height: 300px;
}

.verdict-card {
  padding: 20px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
}
.verdict-name {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 12px;
}
.verdict-act-name {
  font-size: 1.2rem;
  font-weight: 800;
}
.verdict-badge-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.verdict-badge {
  font-family: var(--font);
  font-weight: 800;
  font-size: 0.85rem;
  letter-spacing: 0.5px;
  padding: 8px 16px;
  border-radius: var(--radius-pill);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  line-height: 1.3;
}
.verdict-badge .verdict-icon {
  font-size: 1.1rem;
  line-height: 1;
  flex-shrink: 0;
}
.verdict-recommended {
  background: linear-gradient(135deg, #F0FFF4, #E6FFED);
  color: #256D3B;
  border: 1.5px solid #48BB78;
}
.verdict-risky {
  background: var(--accent-light);
  color: var(--accent);
  border: 1.5px solid var(--accent);
}
.verdict-skip {
  background: var(--danger-light);
  color: var(--danger);
  border: 1.5px solid var(--danger);
}

.result-sections {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 28px;
}
.result-section {
  padding: 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.result-section-title {
  font-size: 0.85rem;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  overflow: visible;
  white-space: normal;
  word-break: break-word;
}
.result-text {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.6;
}
.result-cons-heading {
  margin-top: 12px;
}

.pros-cons-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.pros-item, .cons-item {
  font-size: 0.85rem;
  padding: 4px 0;
  color: var(--text-secondary);
}
.pros-item::before { content: '✅ '; }
.cons-item::before { content: '❌ '; }

.result-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 10px;
}

/* ═══════════════════════════════════════════════
   MENTOR PAGE
   ═══════════════════════════════════════════════ */
.mentor-grid {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.mentor-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 28px 20px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
  font-family: var(--font);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.mentor-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--primary);
}
.mentor-emoji { font-size: 2.5rem; margin-bottom: 4px; }
.mentor-name { font-weight: 800; font-size: 1.1rem; }
.mentor-desc { font-size: 0.85rem; color: var(--text-secondary); max-width: 280px; }

.mentor-convo { margin-top: 20px; }

/* ═══════════════════════════════════════════════
   CHAT (shared by AI Friend & Mentor)
   ═══════════════════════════════════════════════ */
.chat-area {
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 200px;
  max-height: 50vh;
  overflow-y: auto;
  padding: 16px 0;
  margin-bottom: 16px;
}
.chat-bubble {
  max-width: 85%;
  padding: 14px 18px;
  border-radius: var(--radius);
  font-size: 0.9rem;
  line-height: 1.6;
  animation: bubbleIn 0.3s ease;
}
@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(10px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.chat-bubble--user {
  background: var(--primary-light);
  border: 1.5px solid var(--primary);
  color: var(--text);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.chat-bubble--ai {
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text-secondary);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  box-shadow: var(--shadow-sm);
}
.chat-input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.chat-textarea {
  flex: 1;
  min-height: 44px;
  max-height: 100px;
}

.ai-friend-page {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 56px);
}
.ai-friend-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 8px;
}
.ai-avatar {
  font-size: 2rem;
  filter: drop-shadow(0 2px 8px var(--accent-glow));
}
.ai-friend-page .chat-area {
  flex: 1;
}

.suggestions-area {
  margin-bottom: 12px;
}
.suggest-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.suggest-pill {
  padding: 8px 14px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-pill);
  font-size: 0.8rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  font-family: var(--font);
  box-shadow: var(--shadow-sm);
}
.suggest-pill:hover {
  background: var(--primary-light);
  color: var(--primary-dim);
  border-color: var(--primary);
}

/* ═══════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════ */
.modal {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: modalIn 0.3s ease;
}
.modal.hidden { display: none; }
.modal-overlay {
  position: absolute;
  inset: 0;
  background: rgba(28, 25, 23, 0.35);
  backdrop-filter: blur(4px);
}
.modal-content {
  position: relative;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 28px 24px 32px;
  max-width: 520px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
@keyframes modalIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal-title {
  font-size: 1.1rem;
  margin-bottom: 20px;
  color: var(--text);
  font-weight: 800;
}
.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.modal-actions .btn { flex: 1; }

.paste-section {
  padding-top: 16px;
  border-top: 1.5px solid var(--border);
  margin-top: 4px;
}

/* ═══════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 24px;
  background: var(--text);
  border-radius: var(--radius-pill);
  font-size: 0.85rem;
  color: #fff;
  box-shadow: var(--shadow-lg);
  z-index: 300;
  animation: toastIn 0.3s ease;
}
.toast.hidden { display: none; }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ═══════════════════════════════════════════════
   CONFIRM DIALOG (for removing activities)
   ═══════════════════════════════════════════════ */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(28, 25, 23, 0.35);
  backdrop-filter: blur(4px);
  z-index: 250;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: modalIn 0.2s ease;
}
.confirm-dialog {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 360px;
  width: 90%;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.confirm-dialog p {
  margin-bottom: 20px;
  color: var(--text-secondary);
  font-size: 0.9rem;
  line-height: 1.5;
}
.confirm-dialog .confirm-actions {
  display: flex;
  gap: 10px;
}
.confirm-dialog .confirm-actions .btn { flex: 1; }

/* ═══════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════ */
@media (max-width: 480px) {
  .landing-app-name { font-size: 1.8rem; }
  .landing-tagline { font-size: 1.1rem; }
  .stat-value { font-size: 1.6rem; }
  .stats-grid { gap: 10px; }
  .stat-card { padding: 18px 14px; }
  .page-content { padding: 70px 16px 32px; }
  .quick-actions { gap: 8px; }
  .action-card { padding: 16px 8px; }
  .action-icon { font-size: 1.3rem; }
  .action-label { font-size: 0.8rem; }
  .form-row { grid-template-columns: 1fr; }
  .result-actions { grid-template-columns: 1fr; }
  .cal-day { padding: 8px 2px; min-height: 60px; }
  .cal-day-name { font-size: 0.6rem; }
}

@media (min-width: 768px) {
  .landing-container { padding: 120px 24px 80px; }
  .landing-app-name { font-size: 2.8rem; }
  .landing-tagline { font-size: 1.5rem; }
  .page-content { max-width: 580px; padding-top: 90px; }
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ─── Selection ─── */
::selection {
  background: var(--primary-light);
  color: var(--text);
}

</style>
</head>
<body>
  <!-- ═══════════════════════════════════════ -->
  <!-- GLOBAL HEADER (hidden on landing)      -->
  <!-- ═══════════════════════════════════════ -->
  <header id="global-header" class="header hidden">
    <button id="header-back" class="header-btn" aria-label="Back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <span id="header-title" class="header-title">FilterSys</span>
    <button id="lang-toggle" class="header-btn lang-btn" aria-label="Toggle language">EN</button>
  </header>

  <!-- ═══════════════════════════════════════ -->
  <!-- PAGE: LANDING                          -->
  <!-- ═══════════════════════════════════════ -->
  <section id="page-landing" class="page active">
    <div class="landing-lang-toggle">
      <button id="landing-lang-toggle" class="lang-pill" aria-label="Toggle language">EN</button>
    </div>
    <div class="landing-container">
      <div class="landing-hero">
        <div class="landing-logo">
          <div class="logo-icon">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <rect x="4" y="4" width="32" height="32" rx="8" stroke="currentColor" stroke-width="2.5"/>
              <path d="M12 20h16M20 12v16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
              <circle cx="20" cy="20" r="4" fill="currentColor" opacity="0.3"/>
            </svg>
          </div>
          <h1 class="landing-app-name">FilterSys</h1>
        </div>
        <p id="landing-tagline" class="landing-tagline"></p>
      </div>

      <div class="stats-grid">
        <div class="stat-card" data-delay="0">
          <span class="stat-value" id="stat1val"></span>
          <span class="stat-desc" id="stat1desc"></span>
        </div>
        <div class="stat-card" data-delay="200">
          <span class="stat-value" id="stat2val"></span>
          <span class="stat-desc" id="stat2desc"></span>
        </div>
        <div class="stat-card" data-delay="400">
          <span class="stat-value" id="stat3val"></span>
          <span class="stat-desc" id="stat3desc"></span>
        </div>
        <div class="stat-card" data-delay="600">
          <span class="stat-value" id="stat4val"></span>
          <span class="stat-desc" id="stat4desc"></span>
        </div>
      </div>

      <p id="landing-desc" class="landing-desc"></p>

      <button id="landing-cta" class="btn btn-primary btn-lg landing-cta"></button>

      <div class="landing-refs">
        <p class="refs-label" id="refs-label"></p>
        <p class="ref" id="ref1"></p>
        <p class="ref" id="ref2"></p>
        <p class="ref" id="ref3"></p>
        <p class="ref" id="ref4"></p>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════ -->
  <!-- PAGE: QUIZ                             -->
  <!-- ═══════════════════════════════════════ -->
  <section id="page-quiz" class="page">
    <div class="page-content">
      <h2 id="quiz-title" class="page-title"></h2>
      <p id="quiz-subtitle" class="page-subtitle"></p>

      <div id="quiz-question-container" class="quiz-card">
        <h3 id="quiz-question-text" class="quiz-question"></h3>
        <div id="quiz-options" class="quiz-options radio-group vertical">
          <!-- Options injected by JS -->
        </div>
      </div>

      <div class="quiz-actions" style="margin-top: 2rem;">
        <button id="btn-quiz-next" class="btn btn-primary btn-lg btn-full" disabled></button>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════ -->
  <!-- PAGE: ONBOARDING                       -->
  <!-- ═══════════════════════════════════════ -->
  <section id="page-onboarding" class="page">
    <div class="page-content">
      <h2 id="onboarding-title" class="page-title"></h2>
      <p id="onboarding-subtitle" class="page-subtitle"></p>

      <form id="onboarding-form" class="form" autocomplete="off">
        <!-- Alias -->
        <div class="form-group">
          <label id="lbl-alias" for="inp-alias"></label>
          <div class="input-row">
            <input type="text" id="inp-alias" class="input" maxlength="30">
            <button type="button" id="btn-gen-alias" class="btn btn-ghost btn-sm">🎲</button>
          </div>
        </div>

        <!-- Semester -->
        <div class="form-group">
          <label id="lbl-semester" for="inp-semester"></label>
          <select id="inp-semester" class="input">
            <option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4">4</option>
            <option value="5">5</option><option value="6">6</option>
            <option value="7">7</option><option value="8">8</option>
            <option value="9">9</option><option value="10">10</option>
            <option value="11">11</option><option value="12">12</option>
          </select>
        </div>

        <!-- Study hours -->
        <div class="form-group">
          <label id="lbl-study-hours" for="inp-study-hours"></label>
          <div class="slider-row">
            <input type="range" id="inp-study-hours" class="slider" min="0" max="60" value="20">
            <span id="val-study-hours" class="slider-value">20h</span>
          </div>
        </div>

        <!-- GPA -->
        <div class="form-row">
          <div class="form-group">
            <label id="lbl-current-gpa" for="inp-current-gpa"></label>
            <input type="number" id="inp-current-gpa" class="input" min="0" max="4" step="0.01" value="3.00">
          </div>
          <div class="form-group">
            <label id="lbl-target-gpa" for="inp-target-gpa"></label>
            <input type="number" id="inp-target-gpa" class="input" min="0" max="4" step="0.01" value="3.50">
          </div>
        </div>

        <!-- Energy -->
        <div class="form-group">
          <label id="lbl-energy" for="inp-energy"></label>
          <div class="slider-row">

// Get current language
function getLang() {
  return localStorage.getItem('fs_lang') || 'en';
}

// Set language
function setLang(lang) {
  localStorage.setItem('fs_lang', lang);
}

// Get translation string
function t(path) {
  const lang = getLang();
  const keys = path.split('.');
  let val = LANG[lang];
  for (const k of keys) {
    if (!val) return path;
    val = val[k];
  }
  return val || path;
}

const STORAGE_KEYS = {
  user: 'fs_user',
  activities: 'fs_activities',
  academicTasks: 'fs_academic_tasks',
  weeklyLog: 'fs_weekly_log',

// ─── Generic helpers ───

function saveData(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

function loadData(key, fallback = null) {
  const raw = localStorage.getItem(key);
  if (!raw) return fallback;
  try { return JSON.parse(raw); }
  catch { return fallback; }
}

// ─── User Profile ───

function saveUser(user) {
  saveData(STORAGE_KEYS.user, user);
}

function loadUser() {
  return loadData(STORAGE_KEYS.user, null);
}

function hasUser() {
  return loadUser() !== null;
}

// ─── Activities ───

function saveActivities(activities) {
  saveData(STORAGE_KEYS.activities, activities);
}

function loadActivities() {
  return loadData(STORAGE_KEYS.activities, []);
}

function addActivity(activity) {
  const acts = loadActivities();
  activity.id = 'a' + Date.now();
  activity.createdAt = new Date().toISOString();
  acts.push(activity);
  saveActivities(acts);
  return activity;
}

function updateActivity(id, updates) {
  const acts = loadActivities();
  const idx = acts.findIndex(a => a.id === id);
  if (idx !== -1) {
    acts[idx] = { ...acts[idx], ...updates };
    saveActivities(acts);
  }
  return acts;
}

function removeActivity(id) {
  const acts = loadActivities().filter(a => a.id !== id);
  saveActivities(acts);
  return acts;
}

function getCommittedActivities() {
  return loadActivities().filter(a => a.status === 'committed');
}

function getActivitiesForWeek(weekStart) {
  const acts = getCommittedActivities();
  const start = new Date(weekStart);
  const end = new Date(start);
  end.setDate(end.getDate() + 7);
  return acts.filter(a => {
    const d = new Date(a.date);
    return d >= start && d < end;
  });
}

// ─── Academic Tasks ───

function saveAcademicTasks(tasks) {
  saveData(STORAGE_KEYS.academicTasks, tasks);
}

function loadAcademicTasks() {
  return loadData(STORAGE_KEYS.academicTasks, []);
}

function addAcademicTask(task) {
  const tasks = loadAcademicTasks();
  task.id = 't' + Date.now();
  task.completed = false;
  task.createdAt = new Date().toISOString();
  tasks.push(task);
  saveAcademicTasks(tasks);
  return task;
}

function toggleAcademicTask(id) {
  const tasks = loadAcademicTasks();
  const idx = tasks.findIndex(t => t.id === id);
  if (idx !== -1) {
    tasks[idx].completed = !tasks[idx].completed;
    saveAcademicTasks(tasks);
  }
  return tasks;
}

function deleteAcademicTask(id) {
  const tasks = loadAcademicTasks().filter(t => t.id !== id);
  saveAcademicTasks(tasks);
  return tasks;
}

function getUpcomingDeadlines(withinDays = 7) {
  const tasks = loadAcademicTasks();
  const now = new Date();
  const cutoff = new Date(now);
  cutoff.setDate(cutoff.getDate() + withinDays);
  return tasks.filter(t => {
    const d = new Date(t.date);
    return d >= now && d <= cutoff && !t.completed;
  }).sort((a, b) => new Date(a.date) - new Date(b.date));
}

function getExamsWithinDays(days = 3) {
  const tasks = loadAcademicTasks();
  const now = new Date();
  const cutoff = new Date(now);
  cutoff.setDate(cutoff.getDate() + days);
  return tasks.filter(t => {
    const d = new Date(t.date);
    return d >= now && d <= cutoff && t.type === 'exam';
  });
}

function getIncompleteTasksThisWeek() {
  const tasks = loadAcademicTasks();
  const now = new Date();
  const endOfWeek = new Date(now);
  endOfWeek.setDate(endOfWeek.getDate() + (7 - endOfWeek.getDay()));
  return tasks.filter(t => {
    const d = new Date(t.date);
    return d <= endOfWeek && !t.completed;
  });
}

// ─── Weekly Log ───

function getWeekKey(date = new Date()) {
  const d = new Date(date);
  const dayOfWeek = d.getDay();
  const diff = d.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
  const monday = new Date(d.setDate(diff));
  const year = monday.getFullYear();
  const oneJan = new Date(year, 0, 1);
  const weekNum = Math.ceil((((monday - oneJan) / 86400000) + oneJan.getDay() + 1) / 7);
  return `${year}-W${String(weekNum).padStart(2, '0')}`;
}

function getWeeklyLog() {
  const key = getWeekKey();
  const log = loadData(STORAGE_KEYS.weeklyLog, {});
  return log[key] || { hoursUsed: 0, energyCurrent: null, activitiesCount: 0 };
}

function updateWeeklyLog(updates) {
  const key = getWeekKey();
  const log = loadData(STORAGE_KEYS.weeklyLog, {});
  log[key] = { ...getWeeklyLog(), ...updates };
  saveData(STORAGE_KEYS.weeklyLog, log);
}

function recalcWeeklyLog() {
  const weekStart = getWeekStart();
  const acts = getActivitiesForWeek(weekStart);
  const hoursUsed = acts.reduce((sum, a) => sum + (parseFloat(a.duration) || 0), 0);
  const user = loadUser();
  updateWeeklyLog({
    hoursUsed,
    energyCurrent: user ? user.energyBaseline : 7,
    activitiesCount: acts.length,
  });
}

function getWeekStart(date = new Date()) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  d.setHours(0, 0, 0, 0);
  return d.toISOString().split('T')[0];
}

// ═══════════════════════════════════════════════
// ANALYSIS ENGINE
// ═══════════════════════════════════════════════
// Methodology: Weighted multi-criteria decision analysis (MCDA)
// based on the Analytic Hierarchy Process (Saaty, 1980).
// Each dimension is scored 0–10, then combined via domain-
// informed weights. Verdict thresholds are calibrated so that
// a "balanced" activity with no red flags scores ~6.5.
// ═══════════════════════════════════════════════

function analyzeActivity(activity, user) {
  const scores = {};

  // 1. Goal Match (0–10) — MCDA alignment matrix
  scores.goalMatch = calcGoalMatch(activity, user);

  // 2. Energy Cost (0–10) — Spoon Theory + cognitive load
  scores.energyCost = calcEnergyCost(activity, user);

  // 3. Time Feasibility (0–10) — Budget utilization model
  scores.timeFeasibility = calcTimeFeasibility(activity, user);

  // 4. Pros vs Cons Balance (0–10) — Heuristic tally
  const prosConsList = generateProsCons(activity, user);
  scores.prosCons = prosConsList.score;

  // 5. Long-term Value (0–10) — Category + goal heuristic
  scores.longTermValue = calcLongTermValue(activity, user);

  // Weighted composite score (AHP-style weights)
  // Weights rationale: Goal alignment is weighted highest (30%)
  // because research shows value-congruent activities cause less
  // burnout (Maslach & Leiter, 1997). Time (25%) and Long-term
  // value (20%) are next. Energy (15%) and Pros/Cons (10%) are
  // supplementary signals.
  const totalScore = (
    scores.goalMatch * 0.3 +
    scores.energyCost * 0.15 +
    scores.timeFeasibility * 0.25 +
    scores.prosCons * 0.1 +
    scores.longTermValue * 0.2
  );

  let verdict;
  if (totalScore >= 6.5) verdict = 'recommended';
  else if (totalScore >= 4) verdict = 'risky';
  else verdict = 'skip';

  // Additional display-only analyses
  const opportunityCost = calcOpportunityCost(activity, user);
  const gpaRisk = calcGPARisk(activity, user);
  const energyBudget = calcEnergyBudget(activity, user);
  const goalAlignmentText = calcGoalAlignmentText(activity, user, scores.goalMatch);
  const examsNearby = getExamsWithinDays(3);
  const incompleteTasks = getIncompleteTasksThisWeek();

  return {
    scores,
    totalScore: Math.round(totalScore * 10) / 10,
    verdict,
    opportunityCost,
    gpaRisk,
    energyBudget,
    goalAlignmentText,
    pros: prosConsList.pros,
    cons: prosConsList.cons,
    examsNearby,
    incompleteTasks,
  };
}

// ─── 1. Goal Match ─────────────────────────────
// Methodology: Multi-criteria alignment matrix (MCDA).
// Each cell represents domain-expert judgment of how well
// an activity category serves a given priority. This is a
// standard approach in decision support systems.
function calcGoalMatch(activity, user) {
  const alignment = {
    academics: { networking: 2, workshop: 5, club: 3, volunteer: 2, competition: 6, hobby: 1, other: 2 },
    career: { networking: 9, workshop: 8, club: 5, volunteer: 6, competition: 7, hobby: 2, other: 3 },
    income: { networking: 6, workshop: 4, club: 2, volunteer: 1, competition: 3, hobby: 1, other: 2 },
    growth: { networking: 6, workshop: 7, club: 7, volunteer: 8, competition: 6, hobby: 9, other: 5 },
    balance: { networking: 6, workshop: 6, club: 6, volunteer: 6, competition: 6, hobby: 7, other: 5 },
  };

  const primary = user.primaryPriority || 'balance';
  const base = (alignment[primary] && alignment[primary][activity.category]) || 5;

  // Boost if secondary goals also align (+0.5 per aligned secondary)
  let boost = 0;
  (user.secondaryGoals || []).forEach(goal => {
    const secScore = (alignment[goal] && alignment[goal][activity.category]) || 5;
    if (secScore >= 7) boost += 0.5;
  });

  return Math.min(10, base + boost);
}

// ─── 2. Energy Cost ────────────────────────────
// Methodology: Adapted from Spoon Theory (Miserandino, 2003)
// and Kahneman's attention/cognitive load theory (2011).
// Energy is treated as a finite daily resource (1–10 scale).
// Drain rates are normalized to a 2-hour reference event at
// intensity 1.0. Category drain rates reflect the cognitive,
// physical, and emotional demands of each activity type.
//
// Drain rates:
//   Competition: 1.8 (high cognitive + performance anxiety)
//   Volunteer:   1.4 (physical + emotional labor)
//   Workshop:    1.3 (active learning, moderate cognitive load)
//   Networking:  1.2 (social energy expenditure)
//   Club:        1.0 (baseline social gathering)
//   Other:       1.0 (default baseline)
//   Hobby:       0.5 (restorative; Sonnentag, 2001 recovery research)
function calcEnergyCost(activity, user) {
  const duration = activity.duration || 1;
  const drainRates = {
    competition: 1.8,
    volunteer: 1.4,
    workshop: 1.3,
    networking: 1.2,
    club: 1.0,
    other: 1.0,
    hobby: 0.5,
  };
  const drainRate = drainRates[activity.category] || 1.0;

  // Normalized to 2-hour reference: a 2h club event drains 1.0 pts
  const energyDrain = (duration / 2) * drainRate;

  const baseline = user.energyBaseline || 7;
  const weekly = getWeeklyLog();
  const current = weekly.energyCurrent !== null ? weekly.energyCurrent : baseline;
  const remaining = Math.max(0, current - energyDrain);

  // Score: remaining energy mapped to 0–10
  return Math.min(10, Math.round(remaining));
}

// ─── 3. Time Feasibility ───────────────────────
// Methodology: Linear budget utilization model.
// Score = how much of your weekly extracurricular budget
// remains after this event.
//
// Formula: utilizationAfter = (usedHours + duration) / maxHours
// Score = max(1, round(10 × (1 - utilizationAfter)))
//
// Interpretation:
//   0% utilized → 10 (plenty of room)
//   50% utilized → 5
//   100% utilized → 1
//   >100% → 1 (over budget)
function calcTimeFeasibility(activity, user) {
  const weekly = getWeeklyLog();
  const maxHours = user.maxExtracurricularHours || 10;
  const used = weekly.hoursUsed || 0;
  const duration = activity.duration || 1;

  // Already over budget before this event
  if (used >= maxHours) return 1;

  const utilizationAfter = (used + duration) / maxHours;
  const score = Math.round(10 * (1 - utilizationAfter));
  return Math.max(1, Math.min(10, score));
}

// ─── 4. Long-term Value ────────────────────────
// Methodology: Category-based heuristic with secondary
// goal boosting. Reflects general career/development value
// of activity types based on employer surveys (NACE, 2023)
// and student development theory (Astin, 1984).
function calcLongTermValue(activity, user) {
  const catValue = {
    competition: 8,
    workshop: 7,
    networking: 6,
    volunteer: 7,
    club: 5,
    hobby: 4,
    other: 3,
  };
  let base = catValue[activity.category] || 5;

  const secondaryAlignment = {
    career: { competition: 2, workshop: 1, networking: 2 },
    growth: { volunteer: 1, hobby: 2, club: 1 },
    academics: { competition: 1, workshop: 1 },
  };
  (user.secondaryGoals || []).forEach(goal => {
    const boost = (secondaryAlignment[goal] && secondaryAlignment[goal][activity.category]) || 0;
    base += boost;
  });

  return Math.min(10, base);
}

// ─── 5. Pros & Cons ────────────────────────────
function generateProsCons(activity, user) {
  const pros = [];
  const cons = [];
  const lang = getLang();

  const duration = activity.duration || 1;
  const weekly = getWeeklyLog();
  const maxHours = user.maxExtracurricularHours || 10;
  const used = weekly.hoursUsed || 0;

  // Pros
  if (['networking', 'workshop'].includes(activity.category)) {
    pros.push(lang === 'vi' ? 'Mở rộng mạng lưới chuyên nghiệp' : 'Expand professional network');
  }
  if (['workshop', 'competition'].includes(activity.category)) {
    pros.push(lang === 'vi' ? 'Phát triển kỹ năng thiết thực' : 'Build practical skills');
  }
  if (activity.category === 'volunteer') {
    pros.push(lang === 'vi' ? 'Đóng góp xã hội & phát triển nhân cách' : 'Social contribution & character building');
  }
  if (activity.category === 'hobby') {
    pros.push(lang === 'vi' ? 'Thư giãn, phục hồi năng lượng' : 'Rest & energy recovery');
  }
  if (activity.category === 'competition') {
    pros.push(lang === 'vi' ? 'Nổi bật trong CV' : 'Stands out on resume');
  }
  if (activity.cost === 0) {
    pros.push(lang === 'vi' ? 'Miễn phí tham gia' : 'Free to attend');
  }
  if (activity.whatGain && activity.whatGain.length > 20) {
    pros.push(lang === 'vi' ? 'Bạn xác định rõ lợi ích cụ thể' : 'You identified specific benefits');
  }

  // Cons
  if (duration >= 3) {
    cons.push(lang === 'vi' ? `Chiếm ${duration} giờ liên tục` : `Takes ${duration} consecutive hours`);
  }
  if (used + duration > maxHours) {
    cons.push(lang === 'vi' ? 'Vượt ngân sách giờ ngoại khóa tuần này' : 'Exceeds weekly extracurricular budget');
  }

  const exams = getExamsWithinDays(3);
  if (exams.length > 0) {
    const examNames = exams.map(e => e.subject).join(', ');
    cons.push(lang === 'vi' ? `Gần kỳ thi: ${examNames}` : `Near exam: ${examNames}`);
  }

  const incomplete = getIncompleteTasksThisWeek();
  if (incomplete.length >= 2) {
    cons.push(lang === 'vi' ? `${incomplete.length} bài tập chưa hoàn thành` : `${incomplete.length} unfinished assignments`);
  }

  if (activity.cost > 0) {
    cons.push(lang === 'vi' ? `Chi phí: ${activity.cost.toLocaleString()} VND` : `Cost: ${activity.cost.toLocaleString()} VND`);
  }

  const goalScore = calcGoalMatch(activity, user);
  if (goalScore <= 4) {
    const priLabels = {
      academics: lang === 'vi' ? 'tập trung học tập' : 'academic focus',
      career: lang === 'vi' ? 'phát triển nghề nghiệp' : 'career building',
      income: lang === 'vi' ? 'kiếm thu nhập' : 'earning income',
      growth: lang === 'vi' ? 'phát triển bản thân' : 'personal growth',
      balance: lang === 'vi' ? 'cân bằng' : 'balanced lifestyle',
    };
    cons.push(lang === 'vi'
      ? `Ít phù hợp với mục tiêu: ${priLabels[user.primaryPriority]}`
      : `Low alignment with priority: ${priLabels[user.primaryPriority]}`
    );
  }

  // Detect FOMO in reason
  const fomoKeywords = ['everyone', 'mọi người', 'ai cũng', 'bỏ lỡ', 'missing out', 'left out', 'fomo', 'peer'];
  const whyLower = (activity.whyJoin || '').toLowerCase();
  if (fomoKeywords.some(kw => whyLower.includes(kw))) {
    cons.push(lang === 'vi'
      ? '⚠️ Lý do tham gia có dấu hiệu FOMO — hãy xem xét lại'
      : '⚠️ Your reason shows signs of FOMO — reconsider carefully'
    );
  }

  const score = Math.min(10, Math.max(1, 5 + pros.length - cons.length));
  return { pros, cons, score };
}

// ─── Display: Opportunity Cost ─────────────────
// Methodology: Direct time substitution (Economics 101).
// 1 hour spent at an event = 1 hour you cannot study.
// This is definitionally true — the "next best alternative
// forgone" (Mankiw, Principles of Economics).
//
// Pomodoro conversion: Cirillo (2006) The Pomodoro Technique.
// One productive cycle = ~45 min (25 min focus + 5 min break
// + ~15 min setup/context-switching overhead per Ariga &
// Lleras, 2011).
function calcOpportunityCost(activity, user) {
  const duration = activity.duration || 1;
  const subjects = user.keySubjects || [];

  // 1:1 direct substitution
  const lostStudyHours = duration;

  // Convert to Pomodoro-equivalent productive cycles
  // 1 Pomodoro cycle ≈ 45 min (0.75 hours) of wall-clock time
  const pomodoroSessions = Math.round((lostStudyHours / 0.75) * 10) / 10;

  const lang = getLang();
  const subjectExample = subjects[0] || (lang === 'vi' ? 'môn học chính' : 'your key subject');

  return {
    duration,
    pomodoroSessions,
    subjectExample,
    text: lang === 'vi'
      ? `${duration} giờ sự kiện = ${duration} giờ không thể học. Tương đương ~${pomodoroSessions} chu kỳ Pomodoro (45 phút/chu kỳ) cho ${subjectExample}.`
      : `${duration}h at this event = ${duration}h you can't study. That's ~${pomodoroSessions} Pomodoro cycles (45 min each) for ${subjectExample}.`,
  };
}

// ─── Display: GPA Risk ─────────────────────────
// Methodology: Percentage-of-budget model.
// Study time reduction = duration / weeklyStudyHours × 100
// (straightforward: what % of your study plan does this consume?)
//
// Risk thresholds informed by:
// - Credé et al. (2010) meta-analysis: study habits explain
//   ~16% of GPA variance; consistent time reduction compounds.
// - Auburn University: "over-involved" = 11+ hrs/week of
//   extracurriculars correlates with burnout.
//
// Risk levels:
//   LOW:      reduction < 10% AND gapGPA ≤ 0.3
//   MODERATE: reduction 10–20% OR gapGPA > 0.3
//   HIGH:     reduction > 20% AND gapGPA > 0.3, OR reduction > 30%
// Exam proximity: if exam within 3 days, risk escalates one level.
function calcGPARisk(activity, user) {
  const duration = activity.duration || 1;
  const studyHours = user.studyHoursWeekly || 20;

  // Direct percentage: how much of weekly study time does this event consume?
  const reductionPct = Math.round((duration / studyHours) * 100);

  const gapGPA = user.targetGPA - user.currentGPA;

  // Determine base risk level
  let riskLevel;
  if (reductionPct > 30) {
    riskLevel = 'high';
  } else if (reductionPct > 20 && gapGPA > 0.3) {
    riskLevel = 'high';
  } else if (reductionPct > 10 || gapGPA > 0.3) {
    riskLevel = 'moderate';
  } else {
    riskLevel = 'low';
  }

  // Exam proximity escalation
  const lang = getLang();
  const exams = getExamsWithinDays(3);
  let examWarning = '';
  if (exams.length > 0) {
    // Escalate risk one level
    if (riskLevel === 'low') riskLevel = 'moderate';
    else if (riskLevel === 'moderate') riskLevel = 'high';

    examWarning = lang === 'vi'
      ? ` ⚠️ ${t('result.examWarning')}: ${exams.map(e => e.subject).join(', ')}.`
      : ` ⚠️ ${t('result.examWarning')}: ${exams.map(e => e.subject).join(', ')}.`;
  }

  const incomplete = getIncompleteTasksThisWeek();
  let taskWarning = '';
  if (incomplete.length > 0) {
    taskWarning = lang === 'vi'
      ? ` ${incomplete.length} ${t('result.homeworkWarning')}.`
      : ` ${incomplete.length} ${t('result.homeworkWarning')}.`;
  }

  return {
    reductionPct,
    riskLevel,
    text: lang === 'vi'
      ? `Sự kiện ${duration}h chiếm ${reductionPct}% thời gian tự học hàng tuần (${studyHours}h). Với GPA ${Number(user.currentGPA).toFixed(2)} → mục tiêu ${Number(user.targetGPA).toFixed(2)}, rủi ro ở mức ${riskLevel === 'high' ? 'CAO' : riskLevel === 'moderate' ? 'TRUNG BÌNH' : 'THẤP'}.${examWarning}${taskWarning}`
      : `This ${duration}h event uses ${reductionPct}% of your ${studyHours}h weekly study budget. With GPA ${Number(user.currentGPA).toFixed(2)} → target ${Number(user.targetGPA).toFixed(2)}, the risk is ${riskLevel.toUpperCase()}.${examWarning}${taskWarning}`,
  };
}

// ─── Display: Energy Budget ────────────────────
// Uses the same drain model as calcEnergyCost above.
function calcEnergyBudget(activity, user) {
  const baseline = user.energyBaseline || 7;
  const weekly = getWeeklyLog();
  const current = weekly.energyCurrent !== null ? weekly.energyCurrent : baseline;
  const duration = activity.duration || 1;

  const drainRates = {
    competition: 1.8, volunteer: 1.4, workshop: 1.3,
    networking: 1.2, club: 1.0, other: 1.0, hobby: 0.5,
  };
  const drainRate = drainRates[activity.category] || 1.0;
  const energyDrain = Math.round(((duration / 2) * drainRate) * 10) / 10;
  const remaining = Math.round(Math.max(0, current - energyDrain) * 10) / 10;

  const catDescriptions = {
    competition: { en: 'high cognitive load', vi: 'tải nhận thức cao' },
    volunteer: { en: 'physical + emotional effort', vi: 'thể chất + cảm xúc' },
    workshop: { en: 'active learning', vi: 'học tập chủ động' },
    networking: { en: 'social energy', vi: 'năng lượng xã hội' },
    club: { en: 'social gathering', vi: 'giao lưu nhóm' },
    hobby: { en: 'restorative activity', vi: 'hoạt động phục hồi' },
    other: { en: 'general activity', vi: 'hoạt động chung' },
  };
  const desc = catDescriptions[activity.category] || catDescriptions.other;

  const lang = getLang();
  return {
    current,
    energyDrain,
    remaining,
    text: lang === 'vi'
      ? `Năng lượng: ${current}/10. Sự kiện ${duration}h (${desc.vi}) tiêu tốn ~${energyDrain} điểm. Còn lại: ~${remaining}/10.`
      : `Energy: ${current}/10. This ${duration}h event (${desc.en}) drains ~${energyDrain} pts. Remaining: ~${remaining}/10.`,
  };
}

function renderRadarChart(scores) {
  const canvas = document.getElementById('radar-chart');
  const ctx = canvas.getContext('2d');

  if (radarChartInstance) {
    radarChartInstance.destroy();
  }

  const labels = [
    t('result.goalMatch'),
    t('result.energyCost'),
    t('result.timeFeasibility'),
    t('result.prosConsBalance'),
    t('result.longTermValue'),
  ];

  const data = [
    scores.goalMatch,
    scores.energyCost,
    scores.timeFeasibility,
    scores.prosCons,
    scores.longTermValue,
  ];

  radarChartInstance = new Chart(ctx, {
    type: 'radar',
    data: {
      labels,
      datasets: [{
        label: 'Score',
        data,
        backgroundColor: 'rgba(45, 212, 168, 0.15)',
        borderColor: '#2dd4a8',

      },

function commitActivity(activityId) {
  updateActivity(activityId, { status: 'committed' });

  // Update weekly log
  const acts = getCommittedActivities();
  const weekStart = getWeekStart();
  const weekActs = acts.filter(a => {
    const d = new Date(a.date);
    const ws = new Date(weekStart);
    const we = new Date(ws);
    we.setDate(we.getDate() + 7);
    return d >= ws && d < we;
  });
  const hoursUsed = weekActs.reduce((sum, a) => sum + (parseFloat(a.duration) || 0), 0);
  updateWeeklyLog({ hoursUsed, activitiesCount: weekActs.length });

  showToast(getLang() === 'vi' ? 'Đã cam kết! Hoạt động đã thêm vào lịch.' : 'Committed! Activity added to your calendar.');
  navigateTo('dashboard');
}

function skipActivity(activityId) {
  removeActivity(activityId);

  showToast(t('result.skipMsg'));
  navigateTo('dashboard');
}

function renderWeekCalendar() {
  const container = document.getElementById('week-calendar');
  const weekStart = getWeekStart();
  const activities = getCommittedActivities();
  const academicTasks = loadAcademicTasks();
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const dayNames = [
    t('dashboard.mon'), t('dashboard.tue'), t('dashboard.wed'),
    t('dashboard.thu'), t('dashboard.fri'), t('dashboard.sat'), t('dashboard.sun')
  ];

  let html = '';
  for (let i = 0; i < 7; i++) {
    const date = new Date(weekStart);
    date.setDate(date.getDate() + i);
    const dateStr = date.toISOString().split('T')[0];
    const isToday = date.getTime() === today.getTime();

    // Count activities on this day
    const dayActivities = activities.filter(a => a.date === dateStr);
    const dayAcademic = academicTasks.filter(a => a.date === dateStr);

    let dots = '';
    dayActivities.forEach(() => { dots += '<span class="cal-dot"></span>'; });
    dayAcademic.forEach(a => {
      const cls = a.type === 'exam' ? 'cal-dot--exam' : 'cal-dot--academic';
      dots += `<span class="cal-dot ${cls}"></span>`;
    });

    html += `
      <div class="cal-day ${isToday ? 'today' : ''}">
        <span class="cal-day-name">${dayNames[i]}</span>
        <span class="cal-day-num">${date.getDate()}</span>
        <div class="cal-dots">${dots}</div>
      </div>
    `;
  }
  container.innerHTML = html;
}

function initAcademicModal() {
  const modal = document.getElementById('modal-academic');
  const form = document.getElementById('academic-form');
  const cancelBtn = document.getElementById('btn-acad-cancel');
  const overlay = modal.querySelector('.modal-overlay');
  const parseBtn = document.getElementById('btn-parse-schedule');

  // Close modal
  function closeModal() { modal.classList.add('hidden'); }
  cancelBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', closeModal);

  // Save
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const task = {
      subject: document.getElementById('acad-subject').value.trim(),
      date: document.getElementById('acad-date').value,
      type: document.getElementById('acad-type').value,
      description: document.getElementById('acad-desc').value.trim(),
      estHours: parseFloat(document.getElementById('acad-hours').value) || 2,
    };

    if (!task.subject || !task.date) {
      showToast(getLang() === 'vi' ? 'Điền đầy đủ thông tin' : 'Fill in all required fields');
      return;
    }

    addAcademicTask(task);
    closeModal();
    renderAcademicChecklist();
    renderWeekCalendar();
    showToast(getLang() === 'vi' ? 'Đã thêm!' : 'Added!');
  });

  // Parse schedule text
  parseBtn.addEventListener('click', () => {
    const text = document.getElementById('acad-paste').value.trim();
    if (!text) return;

    // Simple date extraction: look for patterns like "15/06", "June 15", "2026-06-15"
    const datePatterns = [
      /(\d{1,2})[\/\-](\d{1,2})[\/\-]?(\d{2,4})?/g,
      /(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*/gi,
    ];

    let found = 0;
    const lines = text.split('\n');
    lines.forEach(line => {
      if (!line.trim()) return;
      
      // Try to find a date in the line
      const match = line.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/) ||
                    line.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/) ||
                    line.match(/(\d{1,2})[\/\-](\d{1,2})/);
      
      if (match) {
        let dateStr;
        if (match[0].match(/^\d{4}/)) {
          dateStr = match[0];
        } else {
          const parts = match[0].split(/[\/\-]/);
          const day = parts[0].padStart(2, '0');
          const month = parts[1].padStart(2, '0');
          const year = parts[2] ? (parts[2].length === 2 ? '20' + parts[2] : parts[2]) : new Date().getFullYear();
          dateStr = `${year}-${month}-${day}`;
        }

        // Remove the date from the line to get the subject
        const subject = line.replace(match[0], '').replace(/[-–—:,]/g, ' ').trim();
        
        if (subject) {
          addAcademicTask({
            subject: subject.substring(0, 50),
            date: dateStr,
            type: line.toLowerCase().includes('thi') || line.toLowerCase().includes('exam') ? 'exam' : 'assignment',
            description: '',
            estHours: 2,
          });
          found++;
        }
      }
    });

    if (found > 0) {
      document.getElementById('acad-paste').value = '';
      document.getElementById('modal-academic').classList.add('hidden');
      renderAcademicChecklist();
      renderWeekCalendar();
      showToast(getLang() === 'vi' ? `Đã thêm ${found} mục` : `Added ${found} items`);
    } else {
      showToast(getLang() === 'vi' ? 'Không tìm thấy ngày hợp lệ' : 'No valid dates found');
    }
  });
}

// Utility
function formatDate(dateStr) {
  const d = new Date(dateStr);
  const lang = getLang();
  if (lang === 'vi') {
    return `${d.getDate()}/${d.getMonth() + 1}`;
  }
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}`;
}

function formatTime(timeStr) {
  if (!timeStr) return '';
  const parts = timeStr.split(':');
  if (parts.length < 2) return timeStr;
  const h = parseInt(parts[0]);
  const m = parseInt(parts[1]);
  if (isNaN(h) || isNaN(m)) return timeStr;
  const hour12 = h % 12 === 0 ? 12 : h % 12;
  const minStr = m === 0 ? '00' : '30';
  const lang = getLang();
  let period = '';
  if (lang === 'vi') {
    period = h < 12 ? 'SA' : 'CH';
  } else {
    period = h < 12 ? 'a.m.' : 'p.m.';
  }
  return `${hour12}:${minStr} ${period}`;
}

let currentQuizQ = 1;
let quizAnswers = [];
const TOTAL_QUIZ_Q = 3;

function initQuiz() {
  currentQuizQ = 1;
  quizAnswers = [];
  renderQuizQuestion();
}

function renderQuizQuestion() {
  if (currentQuizQ > TOTAL_QUIZ_Q) {
    finishQuiz();
    return;
  }

  const qKey = `q${currentQuizQ}`;
  document.getElementById('quiz-question-text').textContent = t(`quiz.${qKey}`);
  
  const optionsHtml = ['academics', 'career', 'income', 'growth', 'balance'].map(opt => `
    <label class="radio-card">
      <input type="radio" name="quiz-opt" value="${opt}">
      <span class="radio-icon">${getIconForGoal(opt)}</span>
      <span class="radio-text">${t(`quiz.${qKey}_${opt}`)}</span>
    </label>
  `).join('');
  
  document.getElementById('quiz-options').innerHTML = optionsHtml;
  
  const nextBtn = document.getElementById('btn-quiz-next');
  nextBtn.disabled = true;
  nextBtn.textContent = (currentQuizQ === TOTAL_QUIZ_Q) ? t('quiz.finishBtn') : t('quiz.nextBtn');
  
  // Re-attach event listener by cloning to clear previous click listeners
  const newNextBtn = nextBtn.cloneNode(true);
  nextBtn.parentNode.replaceChild(newNextBtn, nextBtn);
  
  // Listen for selection on the active DOM button
  document.querySelectorAll('input[name="quiz-opt"]').forEach(radio => {
    radio.addEventListener('change', () => {
      newNextBtn.disabled = false;
    });
  });
  
  newNextBtn.addEventListener('click', () => {
    const selected = document.querySelector('input[name="quiz-opt"]:checked');
    if (selected) {
      quizAnswers.push(selected.value);
      currentQuizQ++;
      renderQuizQuestion();
    }
  });
}

function finishQuiz() {
  // Determine most frequent answer
  const counts = {};
  quizAnswers.forEach(a => counts[a] = (counts[a] || 0) + 1);
  let topGoal = quizAnswers[0]; // fallback
  let maxCount = 0;
  for (const [goal, count] of Object.entries(counts)) {
    if (count > maxCount) {
      maxCount = count;
      topGoal = goal;
    }
  }
  
  window._preselectedGoal = topGoal;
  navigateTo('onboarding');
}

function getIconForGoal(goal) {
  const map = {
    academics: '📚',
    career: '💼',
    income: '💰',
    growth: '🌱',
    balance: '⚖️'
  };
  return map[goal] || '🎯';
}

    e.preventDefault();

    const primary = form.querySelector('input[name="primary"]:checked');
    if (!primary) {
      showToast(getLang() === 'vi' ? 'Chọn ưu tiên chính' : 'Select a primary priority');
      return;
    }

    const secondary = Array.from(form.querySelectorAll('input[name="secondary"]:checked')).map(c => c.value);

    const user = {
      alias: aliasInput.value.trim() || generateAlias(),
      lang: getLang(),
      semester: parseInt(document.getElementById('inp-semester').value),
      studyHoursWeekly: parseInt(studySlider.value),
      currentGPA: parseFloat(document.getElementById('inp-current-gpa').value),
      targetGPA: parseFloat(document.getElementById('inp-target-gpa').value),
      energyBaseline: parseInt(energySlider.value),
      primaryPriority: primary.value,
      secondaryGoals: secondary,
      maxExtracurricularHours: parseInt(maxHoursSlider.value),
    };

    saveUser(user);
    recalcWeeklyLog();
    navigateTo('dashboard');
  });
}

let selectedMentor = null;

function initMentor() {
  selectedMentor = null;
  document.getElementById('mentor-select').classList.remove('hidden');
  document.getElementById('mentor-conversation').classList.add('hidden');
  document.getElementById('mentor-chat').innerHTML = '';

  // Bind mentor cards
  document.querySelectorAll('.mentor-card').forEach(card => {
    card.onclick = () => selectMentor(card.dataset.mentor);
  });

  // Back button
  document.getElementById('btn-mentor-back').onclick = () => {
    selectedMentor = null;
    document.getElementById('mentor-select').classList.remove('hidden');
    document.getElementById('mentor-conversation').classList.add('hidden');
  };

  // Ask button
  document.getElementById('btn-mentor-ask').onclick = () => askMentor();
  document.getElementById('mentor-input').onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      askMentor();
    }
  };
}

function selectMentor(type) {
  selectedMentor = type;
  document.getElementById('mentor-select').classList.add('hidden');
  document.getElementById('mentor-conversation').classList.remove('hidden');

  const chat = document.getElementById('mentor-chat');
  const lang = getLang();
  const user = loadUser();

  // Mentor introduction
  const intros = getMentorIntros(type, lang, user);
  chat.innerHTML = `<div class="chat-bubble chat-bubble--ai">${intros}</div>`;

  document.getElementById('mentor-input').placeholder = t('mentor.promptPlaceholder');
  document.getElementById('mentor-input').focus();
}

function askMentor() {
  const input = document.getElementById('mentor-input');
  const text = input.value.trim();
  if (!text || !selectedMentor) return;

  const chat = document.getElementById('mentor-chat');
  const user = loadUser();
  const lang = getLang();

  // Add user message
  chat.innerHTML += `<div class="chat-bubble chat-bubble--user">${escapeHtml(text)}</div>`;
  input.value = '';

  // Generate mentor response
  setTimeout(() => {
    const response = generateMentorResponse(selectedMentor, text, user, lang);
    chat.innerHTML += `<div class="chat-bubble chat-bubble--ai">${response}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }, 500);

  chat.scrollTop = chat.scrollHeight;
}

function getMentorIntros(type, lang, user) {

      en: `Hello${alias ? ', ' + alias : ''}. I'm The Academic. I prioritize GPA above everything else — because in the end, your transcript follows you longer than any club memory.<br><br>Tell me what's bothering you. Be specific: what event or situation is creating FOMO for you right now?`,
      vi: `Xin chào${alias ? ', ' + alias : ''}. Tôi là Người Học Thuật. Tôi ưu tiên GPA trên tất cả — vì bảng điểm theo bạn lâu hơn bất kỳ kỷ niệm câu lạc bộ nào.<br><br>Hãy cho tôi biết điều gì đang khiến bạn băn khoăn. Cụ thể: sự kiện hay tình huống nào đang tạo FOMO cho bạn?`
    },

      overcommit: {

        vi: `${contextData}<br><br>Nhìn tổng thể: ${hoursUsed}h đã dùng, ${maxHours - hoursUsed}h còn lại, năng lượng ${energy}/10. ${committed.length} hoạt động trên vai.<br><br>Tôi không hỏi "có nên hay không." Tôi hỏi "bạn có thể duy trì mà không kiệt sức không?" Vì học kỳ là cuộc marathon, không phải chạy nước rút.<br><br>Hãy kể thêm về điều bạn đang băn khoăn, tôi sẽ giúp bạn tìm điểm cân bằng.`

  else if (isGuilty && mentorResponses.guilty) response = mentorResponses.guilty;

  return response[lang] || response.en;
}

function initAIFriend() {
  const chat = document.getElementById('ai-chat');
  const input = document.getElementById('ai-input');
  const sendBtn = document.getElementById('btn-ai-send');
  const suggestList = document.getElementById('ai-suggest-list');

  // Clear previous chat
  chat.innerHTML = '';

  // Welcome message
  const lang = getLang();
  const user = loadUser();
  const alias = user ? user.alias : '';
  const welcome = lang === 'vi'
    ? `Chào${alias ? ' ' + alias : ''}. Tôi không phán xét — tôi chỉ dựa trên dữ liệu và phản hồi thẳng thắn. Bạn đang suy nghĩ về điều gì?`
    : `Hey${alias ? ' ' + alias : ''}. No judgment here — just data and honest feedback. What's on your mind?`;

  chat.innerHTML = `<div class="chat-bubble chat-bubble--ai">${welcome}</div>`;

  // Render suggestion pills
  const suggestions = t('aiFriend.suggestions');
  if (Array.isArray(suggestions)) {
    suggestList.innerHTML = suggestions.map(s =>
      `<button class="suggest-pill">${s}</button>`
    ).join('');

    suggestList.querySelectorAll('.suggest-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        input.value = pill.textContent;
        sendAIMessage();
      });
    });
  }

  // Send
  sendBtn.onclick = sendAIMessage;
  input.onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendAIMessage();
    }
  };
}

function sendAIMessage() {
  const chat = document.getElementById('ai-chat');
  const input = document.getElementById('ai-input');
  const text = input.value.trim();
  if (!text) return;

  const user = loadUser();
  const lang = getLang();

  // Hide suggestions after first message
  document.getElementById('ai-suggestions').style.display = 'none';

  // User bubble
  chat.innerHTML += `<div class="chat-bubble chat-bubble--user">${escapeHtml(text)}</div>`;
  input.value = '';

  // AI response
  setTimeout(() => {
    const response = generateAIResponse(text, user, lang);
    chat.innerHTML += `<div class="chat-bubble chat-bubble--ai">${response}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }, 600);

  chat.scrollTop = chat.scrollHeight;
}

function generateAIResponse(userText, user, lang) {
  const textLower = userText.toLowerCase();
  const weekly = getWeeklyLog();
  const committed = getCommittedActivities();
  const maxHours = user ? user.maxExtracurricularHours : 10;
